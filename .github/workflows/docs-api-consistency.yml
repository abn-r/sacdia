name: Docs API Consistency

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/verify-api-docs-consistency.mjs'
      - '.github/workflows/docs-api-consistency.yml'
  push:
    branches: [main, development]
    paths:
      - 'docs/**'
      - 'scripts/verify-api-docs-consistency.mjs'
      - '.github/workflows/docs-api-consistency.yml'

jobs:
  verify-api-docs:
    name: Verify API docs are consolidated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run docs consistency check
        run: node scripts/verify-api-docs-consistency.mjs
